services:
  postgres:
    image: postgres:16-alpine
    container_name: tubarao_postgres
    environment:
      POSTGRES_USER: tubarao
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tubarao
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubarao -d tubarao"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: tubarao_pgbouncer
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tubarao_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: tubarao_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "web:host-gateway"
      - "api:host-gateway"
    restart: unless-stopped

  pg_backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: tubarao_pg_backup
    restart: unless-stopped
    volumes:
      - postgres_backup:/backups
      - ./scripts/encrypt-backup.sh:/hooks/encrypt-backup:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: tubarao
      POSTGRES_USER: tubarao
      POSTGRES_PASSWORD: password
      SCHEDULE: "0 2 * * *"
      TZ: America/Sao_Paulo
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 0
      BACKUP_KEEP_MONTHS: 0
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ghcr.io/pepefcardoso/catubarao-api:${IMAGE_TAG:-latest}
    container_name: tubarao_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      update_config:
        order: start-first
        failure_action: rollback

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: ghcr.io/pepefcardoso/catubarao-web:${IMAGE_TAG:-latest}
    container_name: tubarao_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      update_config:
        order: start-first
        failure_action: rollback

volumes:
  postgres_data:
  postgres_backup:
  redis_data:
  caddy_data:
  caddy_config:
