services:
  postgres:
    image: postgres:16-alpine
    container_name: tubarao_postgres
    environment:
      POSTGRES_USER: tubarao
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tubarao
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubarao -d tubarao"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: tubarao_pgbouncer
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tubarao_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: tubarao_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "web:host-gateway"
      - "api:host-gateway"
    restart: unless-stopped

  pg_backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: tubarao_pg_backup
    restart: unless-stopped
    volumes:
      - postgres_backup:/backups
      - ./scripts/encrypt-backup.sh:/hooks/encrypt-backup:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: tubarao
      POSTGRES_USER: tubarao
      POSTGRES_PASSWORD: password
      SCHEDULE: "0 2 * * *"
      TZ: America/Sao_Paulo
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 0
      BACKUP_KEEP_MONTHS: 0
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_backup:
  redis_data:
  caddy_data:
  caddy_config:
